apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    vee.codes/cluster: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
        vee.codes/cluster: local
    spec:
      imagePullSecrets:
        - name: dockerhub-credentials
      containers:
        - name: ${{ values.name }}
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: ${{ values.port }}
          env:
            - name: PORT
              value: "${{ values.port }}"
{%- if values.needsDatabase %}
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: ${{ values.name }}-db-conn
                  key: host
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: ${{ values.name }}-db-conn
                  key: port
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: ${{ values.name }}-db-conn
                  key: database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: ${{ values.name }}-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${{ values.name }}-db-credentials
                  key: password
{%- endif %}
          livenessProbe:
            httpGet:
              path: /health
              port: ${{ values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: ${{ values.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
