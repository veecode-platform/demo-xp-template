apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    vee.codes/cluster: local
    vee.codes/app: ${{ values.name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: ${{ values.port }}
      protocol: TCP
  selector:
    app: ${{ values.name }}
