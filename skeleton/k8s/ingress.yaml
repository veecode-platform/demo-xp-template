apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ values.name }}
  labels:
    app: ${{ values.name }}
    vee.codes/cluster: local
    backstage.io/kubernetes-id: ${{ values.name }}
spec:
  rules:
    - host: ${{ values.name }}.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${{ values.name }}
                port:
                  number: 80
