name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE: veecode/${{ values.name }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ "${{ secrets.DOCKER_USERNAME }}" }}
          password: ${{ "${{ secrets.DOCKER_PASSWORD }}" }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ "${{ env.IMAGE }}" }}:${{ "${{ github.sha }}" }}
            ${{ "${{ env.IMAGE }}" }}:latest

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ "${{ secrets.KUBECONFIG }}" }}" | base64 -d > $HOME/.kube/config

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry dockerhub-credentials \
            --docker-server=https://index.docker.io/v1/ \
            --docker-username=${{ "${{ secrets.DOCKER_USERNAME }}" }} \
            --docker-password=${{ "${{ secrets.DOCKER_PASSWORD }}" }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create database connection secret
        run: |
          kubectl create secret generic db-conn \
            --from-literal=host=${{ "${{ secrets.DB_HOST }}" }} \
            --from-literal=port=${{ "${{ secrets.DB_PORT }}" }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply database resources
        run: kubectl apply -f k8s/database.yaml

      - name: Wait for Crossplane user to be ready
        run: |
          echo "Waiting for Crossplane user to be ready..."
          kubectl wait --for=condition=Ready user/${{ values.name }}-user --timeout=300s

      - name: Grant database permissions
        run: |
          sudo apt-get install -y -qq postgresql-client > /dev/null
          PGPASSWORD=${{ "${{ secrets.DOADMIN_PASSWORD }}" }} psql \
            "host=${{ "${{ secrets.DB_HOST }}" }} port=${{ "${{ secrets.DB_PORT }}" }} dbname=${{ values.name }} user=doadmin sslmode=require" \
            -c "GRANT ALL ON SCHEMA public TO \"${{ values.name }}-user\"; GRANT ALL ON ALL TABLES IN SCHEMA public TO \"${{ values.name }}-user\"; ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO \"${{ values.name }}-user\";"

      - name: Deploy application
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ "${{ env.IMAGE }}" }}:${{ "${{ github.sha }}" }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml -f k8s/service.yaml -f k8s/ingress.yaml
